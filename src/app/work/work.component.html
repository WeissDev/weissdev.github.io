<div id="work" class="tile white center">
  <h2 class="text-center">Work Experience <i class="fa fa-briefcase" aria-hidden="true"></i></h2>

  <div id="jobs" class="center">
    <div *ngFor="let job of jobs" class="job">
      <h3 class="title">{{job.title}}</h3>
      <span class="company">{{job.company}}</span>
      <span class="location">{{job.location}}</span>
      <span class="time blue">{{job.time}}</span>
      <p>{{job.description}}</p>
    </div>
  </div>
</div>
