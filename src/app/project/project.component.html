<div id="projects" class="row center">
  <h2 class="text-center">Projects <i class="fa fa-code" aria-hidden="true"></i></h2>
    <div class="project tile white" *ngFor="let project of projects; let i = index" [ngClass]="i % 2 === 0 ? 'left' : 'right'">
      <h3 class="title">{{project.title}}</h3>
      <span class="year">{{project.year}}</span>

      <div class="links center">
        <a *ngIf="project.url.length > 0" href="{{project.url}}" target="_blank"><i class="fa fa-external-link" aria-hidden="true"></i> View the page</a>
        <a *ngIf="project.gitHubRepoUrl.length > 0" href="{{project.gitHubRepoUrl}}" target="_blank"><i class="fa fa-github" aria-hidden="true"></i> Repo</a>
      </div>

      <p>{{project.description}}</p>
      <div class="image" *ngFor="let image of project.images">
        <img  src="{{image}}" alt="">
      </div>

      <h3 class="text-center">Built with</h3>
      <div class="technologies">
        <div class="skill" *ngFor="let skill of project.technologiesUsed">
          <img src="{{skill.imgPath}}" alt="{{skill.name}}" title="{{skill.name}}">
        </div>
      </div>

    </div>
</div>
