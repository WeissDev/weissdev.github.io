<div id="header">
  <div id="name">
    <h1 class="inline">Valentin Weiss</h1>
    <span class="inline">Student, Computer Science (UZH)</span>
  </div>

  <ul id="contact">
    <li><i class="fa fa-envelope" aria-hidden="true"></i> valentin.weiss@hotmail.com</li>
    <li><i class="fa fa-github" aria-hidden="true"></i> WeissDev</li>
    <li><i class="fa fa-map-marker" aria-hidden="true"></i> Zurich, Switzerland</li>
  </ul>

  <div id="skill-wrapper" class="center">
    <div id="biopic">
      <img class="center" src="/assets/images/biopic.jpg" alt="Valentin Weiss">
    </div>

    <h3>Skills at a glance</h3>

    <div id="skills">
      <div class="category">
        <ng-container *ngFor="let skill of skills">
          <head-skill *ngIf="skill.percent > 79" [skill]="skill"></head-skill>
        </ng-container>
      </div>

      <div class="category">
        <ng-container *ngFor="let skill of skills">
          <head-skill *ngIf="skill.percent > 59 && skill.percent < 79" [skill]="skill"></head-skill>
        </ng-container>
      </div>

      <div class="category">
        <ng-container *ngFor="let skill of skills">
          <head-skill *ngIf="skill.percent > 39 && skill.percent < 59" [skill]="skill"></head-skill>
        </ng-container>
      </div>

      <div class="category">
        <ng-container *ngFor="let skill of skills">
          <head-skill *ngIf="skill.percent < 39" [skill]="skill"></head-skill>
        </ng-container>
      </div>

    </div>
  </div>
</div>
